services:
    traefik:
        image: traefik:v3.4
        container_name: traefik-local
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
        ports:
            - "80:80"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        restart: unless-stopped

    podiumforge-db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: podiumforge
            POSTGRES_USER: podiumforge
            POSTGRES_PASSWORD: podiumforge
        volumes:
            - podiumforge-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U podiumforge -d podiumforge"]
            interval: 5s
            timeout: 5s
            retries: 20

    podiumforge-mailpit:
        image: axllent/mailpit:v1.24
        restart: unless-stopped
        ports:
            - "1025:1025"
            - "8025:8025"

    podiumforge-api:
        image: "${PODIUMFORGE_API_IMAGE:-ghcr.io/jeroenkool74/podiumforge-api:latest}"
        pull_policy: always
        restart: unless-stopped
        environment:
            DATABASE_URL: postgresql+psycopg://podiumforge:podiumforge@podiumforge-db:5432/podiumforge
            JWT_SECRET_KEY: "${PODIUMFORGE_JWT_SECRET_KEY:-change-me-local-secret}"
            CORS_ORIGINS: '["http://localhost","http://download.lan","http://downloads.lan","http://home.lan","http://tournament.lan"]'
            SEEDED_ADMIN_EMAIL: "${PODIUMFORGE_ADMIN_EMAIL:-admin@podiumforge.local}"
            SEEDED_ADMIN_PASSWORD: "${PODIUMFORGE_ADMIN_PASSWORD:-admin1234}"
            SEEDED_ADMIN_USERNAME: "${PODIUMFORGE_ADMIN_USERNAME:-admin}"
            SMTP_HOST: podiumforge-mailpit
            SMTP_PORT: "1025"
            SMTP_FROM_EMAIL: "${PODIUMFORGE_SMTP_FROM_EMAIL:-no-reply@podiumforge.local}"
            SMTP_FROM_NAME: "${PODIUMFORGE_SMTP_FROM_NAME:-PodiumForge}"
            PASSWORD_RESET_URL_BASE: "${PODIUMFORGE_PASSWORD_RESET_URL_BASE:-http://tournament.lan/reset-password}"
        depends_on:
            podiumforge-db:
                condition: service_healthy
            podiumforge-mailpit:
                condition: service_started
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 10s

    podiumforge-web:
        image: "${PODIUMFORGE_WEB_IMAGE:-ghcr.io/jeroenkool74/podiumforge-web:latest}"
        pull_policy: always
        restart: unless-stopped
        environment:
            PODIUMFORGE_API_UPSTREAM: http://podiumforge-api:8000
        depends_on:
            podiumforge-api:
                condition: service_healthy
        labels:
            traefik.enable: "true"
            traefik.http.routers.podiumforge.rule: Host(`tournament.lan`)
            traefik.http.routers.podiumforge.entrypoints: web
            traefik.http.services.podiumforge.loadbalancer.server.port: "80"

    website-proxy:
        build:
            context: ./website
        restart: unless-stopped
        volumes:
            - ${HOME}/personal/lan-voorbereiding:/usr/share/nginx/html/downloads:ro
        labels:
            traefik.enable: "true"
            traefik.http.routers.website-proxy.rule: Host(`localhost`) || Host(`download.lan`) || Host(`downloads.lan`) || Host(`home.lan`)
            traefik.http.routers.website-proxy.entrypoints: web
            traefik.http.services.website-proxy.loadbalancer.server.port: "80"

volumes:
    podiumforge-postgres-data:
