server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /downloads {
    return 301 /downloads/;
  }

  location /downloads/ {
    alias /usr/share/nginx/html/downloads/;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
  }

  location / {
    try_files $uri /index.html;
  }
}
