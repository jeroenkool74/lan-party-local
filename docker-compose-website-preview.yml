services:
  website:
    build:
      context: ./website
    pull_policy: build
    restart: always
    networks:
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.lanlocal.rule=Host(`lan.jkool.nl`)
      - traefik.http.routers.lanlocal.entrypoints=websecure
      - traefik.http.routers.lanlocal.tls.certresolver=leresolver
networks:
  traefik_proxy:
    name: traefik_proxy
    external: true
